<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무정초등학교 스마트 키오스크 통합 포털</title>
    <!-- Google Fonts 및 아이콘 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #06020f 100%);
            --card-burger: linear-gradient(145deg, rgba(255, 199, 44, 0.15) 0%, rgba(213, 43, 30, 0.1) 100%);
            --card-icecream: linear-gradient(145deg, rgba(255, 182, 193, 0.2) 0%, rgba(135, 206, 250, 0.15) 100%);
            --text-light: #ffffff;
            --text-gray: #b0aebf;
            --primary-burger: #ffc72c;
            --primary-icecream: #ffb6c1;
            --radius-xl: 30px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            color: var(--text-light);
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .portal-wrapper {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Galaxy Tab S10+ 16:10 비율(세로 10:16) 대응 컨테이너 */
        .portal-container {
            width: 100%;
            max-width: 62.5vh; /* 세로비율 10:16 고정 */
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-top: 20px;
            animation: fadeInDown 0.8s ease;
        }

        header h1 {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            font-size: 32px;
            font-weight: 900;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #ffc72c, #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 16px;
            color: var(--text-gray);
            margin: 0;
            font-weight: 300;
        }

        .selection-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 25px;
            margin: 40px 0;
            flex-grow: 1;
            justify-content: center;
            animation: fadeInUp 0.8s ease;
        }

        .kiosk-card {
            flex: 1;
            max-height: 28vh;
            border-radius: var(--radius-xl);
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: var(--transition);
        }

        .kiosk-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: var(--transition);
            z-index: 1;
        }

        .kiosk-card.burger::before {
            background: var(--card-burger);
        }

        .kiosk-card.icecream::before {
            background: var(--card-icecream);
        }

        .kiosk-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .kiosk-card:hover::before {
            opacity: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
            text-align: left;
            max-width: 60%;
        }

        .card-content h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
        }

        .kiosk-card.burger h2 { color: var(--primary-burger); }
        .kiosk-card.icecream h2 { color: var(--primary-icecream); }

        .card-content p {
            font-size: 14px;
            color: var(--text-gray);
            margin: 0 0 15px 0;
            line-height: 1.4;
            word-break: keep-all;
        }

        .launch-btn {
            display: inline-flex;
            align-items: center;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .kiosk-card.burger .launch-btn {
            background: var(--primary-burger);
            color: #121214;
        }

        .kiosk-card.icecream .launch-btn {
            background: var(--primary-icecream);
            color: #121214;
        }

        .kiosk-card:hover .launch-btn {
            transform: translateX(5px);
        }

        .card-icon {
            font-size: 80px;
            position: relative;
            z-index: 2;
            transition: var(--transition);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .kiosk-card:hover .card-icon {
            transform: scale(1.15) rotate(5deg);
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 10px;
            animation: fadeIn 1.2s ease;
        }

        footer strong {
            color: var(--text-gray);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 태블릿 화면 높이에 대응하여 카드 높이 미세 조정 */
        @media (max-height: 800px) {
            .kiosk-card {
                padding: 20px;
            }
            .card-icon {
                font-size: 60px;
            }
            header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="portal-wrapper">
        <div class="portal-container">
            <header>
                <h1>무정초등학교 스마트 키오스크</h1>
                <p>원하시는 키오스크 유형을 선택하여 시작해 주세요.</p>
            </header>

            <div class="selection-area">
                <!-- 햄버거 키오스크 카드 -->
                <a href="hamburger.html" class="kiosk-card burger">
                    <div class="card-content">
                        <h2>🍔 햄버거 Kiosk</h2>
                        <p>햄버거, 디저트, 음료 메뉴 주문 및 실시간 영수증 출력 실습</p>
                        <span class="launch-btn">체험하기 ➔</span>
                    </div>
                    <div class="card-icon">🍔</div>
                </a>

                <!-- 아이스크림 키오스크 카드 -->
                <a href="icecream.html" class="kiosk-card icecream">
                    <div class="card-content">
                        <h2>🍦 아이스크림 Kiosk</h2>
                        <p>파스텔 테마의 다양한 소프티, 파르페 및 토핑 추가 실습</p>
                        <span class="launch-btn">체험하기 ➔</span>
                    </div>
                    <div class="card-icon">🍦</div>
                </a>
            </div>

            <footer>
                <strong>무정초등학교 교육용 POS 시스템</strong><br>
                본 키오스크는 블루투스 영수증 인쇄 연동 실습이 가능합니다.
            </footer>
        </div>
    </div>
</body>
</html>
